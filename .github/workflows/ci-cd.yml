name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Tests & SonarCloud
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx
      - name: Ejecutar tests con cobertura
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          pytest tests/ --cov=app --cov-report=xml --cov-report=term -v
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & Push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/fati2809/maposting-backend:latest

  k6:
    name: K6 Load Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Iniciar servidor en background
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
      - name: Instalar k6
        run: |
          curl https://github.com/grafana/k6/releases/download/v0.49.0/k6-v0.49.0-linux-amd64.tar.gz -L | tar xvz
          sudo mv k6-v0.49.0-linux-amd64/k6 /usr/local/bin/
      - name: Ejecutar k6
        run: k6 run k6/load_test.js

  deploy:
    name: Deploy a GCP
    runs-on: ubuntu-latest
    needs: [docker, k6]
    steps:
      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.BASTION_IP }} >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ${{ secrets.GCP_USER }}@${{ secrets.BASTION_IP }} \
            "ssh-keyscan -H ${{ secrets.DOCKER_SERVER_IP }}" >> ~/.ssh/known_hosts || true

      - name: Deploy en docker-server via bastion
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ProxyJump=${{ secrets.GCP_USER }}@${{ secrets.BASTION_IP }} \
            ${{ secrets.GCP_USER }}@${{ secrets.DOCKER_SERVER_IP }} \
            "
              echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u fati2809 --password-stdin &&
              docker pull ghcr.io/fati2809/maposting-backend:latest &&
              docker stop maposting-backend || true &&
              docker rm maposting-backend || true &&
              docker run -d \
                --name maposting-backend \
                --restart unless-stopped \
                -p 8000:8000 \
                -e SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
                -e SUPABASE_KEY=${{ secrets.SUPABASE_KEY }} \
                ghcr.io/fati2809/maposting-backend:latest
            "

      - name: Verificar deploy
        run: |
          sleep 5
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ProxyJump=${{ secrets.GCP_USER }}@${{ secrets.BASTION_IP }} \
            ${{ secrets.GCP_USER }}@${{ secrets.DOCKER_SERVER_IP }} \
            "docker ps | grep maposting-backend"
